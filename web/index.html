<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUXVM Showcase</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --crt-glow: rgba(57, 255, 20, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            overflow-y: auto;
            text-transform: uppercase;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            padding: 20px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px var(--crt-glow), inset 0 0 20px var(--crt-glow);
            background: rgba(0, 20, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 4px;
        }

        canvas {
            image-rendering: pixelated;
            border: 1px solid var(--neon-green);
            width: 640px;
            height: 320px;
            background: #000;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            width: 640px;
        }

        .panel {
            border: 1px solid var(--neon-green);
            padding: 10px;
            background: rgba(0, 40, 0, 0.2);
        }

        .panel-title {
            font-weight: bold;
            border-bottom: 1px solid var(--neon-green);
            margin-bottom: 5px;
            padding-bottom: 2px;
        }

        #stack-view, #status-view {
            font-size: 14px;
            height: 100px;
            overflow-y: auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-green);
        }

        button:active {
            transform: translateY(2px);
        }

        .status-msg {
            margin-top: 10px;
            font-size: 12px;
            height: 20px;
        }

        .repl {
            margin-top: 20px;
            width: 640px;
            border: 1px solid var(--neon-green);
            background: rgba(0, 40, 0, 0.2);
        }

        .repl-title {
            font-weight: bold;
            border-bottom: 1px solid var(--neon-green);
            padding: 6px 10px;
        }

        #repl-output {
            height: 180px;
            overflow-y: auto;
            padding: 8px 10px;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .repl-input-row {
            display: flex;
            border-top: 1px solid var(--neon-green);
        }

        .repl-prompt {
            padding: 8px 10px;
            border-right: 1px solid var(--neon-green);
            flex-shrink: 0;
        }

        #repl-input {
            flex: 1;
            background: transparent;
            color: var(--neon-green);
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            padding: 8px 6px;
        }

        .repl-controls {
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            border-top: 1px solid var(--neon-green);
        }

        .repl-controls button {
            padding: 6px 14px;
            font-size: 12px;
        }

        .repl-line-out  { color: #aaffaa; }
        .repl-line-err  { color: #ff6666; }
        .repl-line-stack { color: var(--neon-green); }
        .repl-line-input { color: #66ff66; opacity: 0.7; }

        /* Flicker animation */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.98; }
            20% { opacity: 0.92; }
            100% { opacity: 1; }
        }

        .container {
            animation: flicker 0.1s infinite;
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div class="container">
        <h1>NUXVM DEVICE I/O</h1>

        <div class="repl">
            <div class="repl-title">LUX REPL</div>
            <div id="repl-output"></div>
            <div class="repl-input-row">
                <span class="repl-prompt">lux&gt;</span>
                <input id="repl-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="" />
            </div>
            <div class="repl-controls">
                <button id="repl-run">RUN</button>
                <button id="repl-clear-stack">CLEAR_STACK</button>
                <button id="repl-reset">RESET</button>
                <button id="repl-help">HELP</button>
            </div>
        </div>

        <canvas id="display" width="16" height="8" style="margin-top: 20px;"></canvas>

        <div class="dashboard">
            <div class="panel">
                <div class="panel-title">CPU STATUS</div>
                <div id="status-view">
                    PC: <span id="pc-val">0</span><br>
                    RUNNING: <span id="run-val">FALSE</span><br>
                    OP: <span id="op-val">-</span>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">DATA STACK</div>
                <div id="stack-view"></div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-run">INIT_SYSTEM</button>
            <button id="btn-reset">REBOOT</button>
        </div>

        <div class="status-msg" id="msg">WAITING FOR OPERATOR...</div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const canvas = document.getElementById('display');
        const ctx = canvas.getContext('2d');
        const pcVal = document.getElementById('pc-val');
        const runVal = document.getElementById('run-val');
        const opVal = document.getElementById('op-val');
        const stackView = document.getElementById('stack-view');
        const msg = document.getElementById('msg');
        const btnRun = document.getElementById('btn-run');
        const btnReset = document.getElementById('btn-reset');

        let running = false;
        let wasmLoaded = false;

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("nux.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            wasmLoaded = true;
            msg.innerText = "SYSTEM READY. PRESS ANY KEY TO HALT AFTER INIT.";
        }).catch(err => {
            console.error(err);
            msg.innerText = "SYSTEM FAILURE: WASM LOAD ERROR";
        });


        function updateUI() {
            if (!wasmLoaded) return;
            
            pcVal.innerText = nux_get_pc();
            opVal.innerText = nux_get_op();
            const stack = nux_get_stack();
            stackView.innerHTML = stack.map((v, i) => `[${i}] ${v}`).reverse().join('<br>');
            
            // Render Framebuffer
            const mem = nux_get_memory();
            const fbOffset = 4096; // VideoFramebufferStart (DeviceMemoryOffset)
            const frameWidth = 16;
            const frameHeight = 8;

            const imageData = ctx.createImageData(frameWidth, frameHeight);
            for (let i = 0; i < frameWidth * frameHeight; i++) {
                const pixelOffset = fbOffset + i * 4;
                // Read 4 bytes for each pixel. The Go program seems to write 32-bit values.
                // Check if the memory slice is long enough.
                if (pixelOffset + 3 >= mem.length) {
                    console.error(`Framebuffer read out of bounds at offset ${pixelOffset}`);
                    break; 
                }
                const val = (mem[pixelOffset] << 24) | (mem[pixelOffset+1] << 16) | (mem[pixelOffset+2] << 8) | mem[pixelOffset+3];
                
                const idx = i * 4;
                if (val !== 0) {
                    imageData.data[idx] = 57;   // Neon green R
                    imageData.data[idx+1] = 255; // Neon green G
                    imageData.data[idx+2] = 20;  // Neon green B
                    imageData.data[idx+3] = 255; // Alpha
                } else {
                    imageData.data[idx] = 0;
                    imageData.data[idx+1] = 0;
                    imageData.data[idx+2] = 0;
                    imageData.data[idx+3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);

        }

        function step() {
            if (!running) return;
            
            // Run multiple steps per animation frame for speed
            for (let i = 0; i < 50; i++) {
                const stillRunning = nux_step();
                if (!stillRunning) {
                    running = false;
                    runVal.innerText = "HALTED";
                    msg.innerText = "PROGRAM TERMINATED.";
                    break;
                }
            }
            
            updateUI();
            if (running) {
                requestAnimationFrame(step);
            }
        }

        btnRun.addEventListener('click', () => {
            if (!wasmLoaded) return;
            if (running) return;
            
            running = true;
            runVal.innerText = "TRUE";
            msg.innerText = "RUNNING SPRITE_GAME — ARROW KEYS TO MOVE";
            btnRun.innerText = "RESUME_SYSTEM";
            step();
        });

        btnReset.addEventListener('click', () => {
            if (!wasmLoaded) return;
            nux_reset();
            running = false;
            runVal.innerText = "FALSE";
            btnRun.innerText = "INIT_SYSTEM";
            msg.innerText = "SYSTEM REBOOTED.";
            updateUI();
        });

        const keyDirMap = { ArrowUp: 1, ArrowDown: 2, ArrowLeft: 3, ArrowRight: 4 };
        function nuxKeydown(e) {
            if (!wasmLoaded) return;
            if (e.key.startsWith('Arrow') || e.key === ' ') e.preventDefault();
            nux_set_keydown(keyDirMap[e.key] ?? 5);
        }
        function nuxKeyup(e) {
            if (!wasmLoaded) return;
            nux_set_keydown(0);
        }
        window.addEventListener('keydown', nuxKeydown);
        window.addEventListener('keyup', nuxKeyup);

        // Periodic UI update when not running and for initial display
        setInterval(() => {
            if (!running) {
                updateUI();
            }
        }, 100);

        // --- LUX REPL ---

        const replOutput = document.getElementById('repl-output');
        const replInput  = document.getElementById('repl-input');
        const replHistory = [];
        let replHistoryIdx = -1;

        function replAppend(text, cls) {
            const line = document.createElement('div');
            line.className = cls || '';
            line.textContent = text;
            replOutput.appendChild(line);
            replOutput.scrollTop = replOutput.scrollHeight;
        }

        function replShowHelp() {
            replAppend('── LUX REPL ──────────────────────────────', 'repl-line-stack');
            replAppend('  5 10 +            arithmetic: + - * / mod', 'repl-line-stack');
            replAppend('  42 .              print number', 'repl-line-stack');
            replAppend('  72 emit           print char  (72 = H)', 'repl-line-stack');
            replAppend('  dup swap drop rot stack ops', 'repl-line-stack');
            replAppend('  x [1 +] 3 #:      repeat x 3 times', 'repl-line-stack');
            replAppend('  [<] [+] [*] ?:    if-else combinator', 'repl-line-stack');
            replAppend('  @sq dup * ;       define word', 'repl-line-stack');
            replAppend('── GRAPHICS (16x8 canvas) ────────────────', 'repl-line-stack');
            replAppend('  x y color pixel   draw pixel', 'repl-line-stack');
            replAppend('    color: 0=black  0xffffff=white', 'repl-line-stack');
            replAppend('    x: 0-15   y: 0-7', 'repl-line-stack');
            replAppend('  cls                clear screen', 'repl-line-stack');
            replAppend('  examples:', 'repl-line-stack');
            replAppend('    0 0 0xffffff pixel', 'repl-line-stack');
            replAppend('    cls', 'repl-line-stack');
            replAppend('────────────────────────────────────────', 'repl-line-stack');
        }

        function replEval() {
            if (!wasmLoaded) return;
            const line = replInput.value.trim();
            replInput.value = '';
            replHistoryIdx = -1;

            if (line === '') return;

            replHistory.unshift(line);
            replAppend('lux> ' + line, 'repl-line-input');

            const result = nux_lux_eval(line);
            if (result.error) {
                replAppend('error: ' + result.error, 'repl-line-err');
            } else {
                if (result.output) {
                    replAppend(result.output, 'repl-line-out');
                }
                const stack = Array.from({length: result.stack.length}, (_, i) => result.stack[i]);
                replAppend('stack: [' + stack.join(', ') + ']', 'repl-line-stack');
            }
            if (!running) updateUI();
        }

        replInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                replEval();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (replHistoryIdx + 1 < replHistory.length) {
                    replHistoryIdx++;
                    replInput.value = replHistory[replHistoryIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (replHistoryIdx > 0) {
                    replHistoryIdx--;
                    replInput.value = replHistory[replHistoryIdx];
                } else {
                    replHistoryIdx = -1;
                    replInput.value = '';
                }
            }
        });

        document.getElementById('repl-run').addEventListener('click', replEval);

        document.getElementById('repl-clear-stack').addEventListener('click', () => {
            if (!wasmLoaded) return;
            nux_lux_reset();
            replAppend('stack cleared', 'repl-line-stack');
        });

        document.getElementById('repl-reset').addEventListener('click', () => {
            if (!wasmLoaded) return;
            nux_lux_reset();
            replOutput.innerHTML = '';
            replAppend('repl reset', 'repl-line-stack');
            if (!running) updateUI();
        });

        document.getElementById('repl-help').addEventListener('click', replShowHelp);

        // Focus REPL input when not running the VM demo
        replInput.addEventListener('focus', () => {
            window.removeEventListener('keydown', nuxKeydown);
            window.removeEventListener('keyup', nuxKeyup);
        });
        replInput.addEventListener('blur', () => {
            window.addEventListener('keydown', nuxKeydown);
            window.addEventListener('keyup', nuxKeyup);
        });

    </script>
</body>
</html>
