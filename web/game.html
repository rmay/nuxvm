<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUXVM Sprite Game</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --crt-glow: rgba(57, 255, 20, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            padding: 20px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px var(--crt-glow), inset 0 0 20px var(--crt-glow);
            background: rgba(0, 20, 0, 0.1);
            animation: flicker 0.1s infinite;
        }

        h1 {
            margin-top: 0;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 4px;
        }

        canvas {
            image-rendering: pixelated;
            border: 1px solid var(--neon-green);
            width: 640px;
            height: 320px;
            background: #000;
            display: block;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-green);
        }

        button:active { transform: translateY(2px); }

        .instructions {
            margin-top: 16px;
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0.7;
            text-align: center;
        }

        .status-msg {
            margin-top: 10px;
            font-size: 12px;
            height: 20px;
        }

        .nav {
            margin-top: 20px;
            text-align: center;
        }

        .nav a {
            color: var(--neon-green);
            text-decoration: none;
            border: 1px solid var(--neon-green);
            padding: 8px 20px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .nav a:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
        }

        @keyframes flicker {
            0%   { opacity: 0.97; }
            5%   { opacity: 0.95; }
            10%  { opacity: 0.9;  }
            15%  { opacity: 0.98; }
            20%  { opacity: 0.92; }
            100% { opacity: 1;    }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="container">
        <h1>NUXVM SPRITE GAME</h1>

        <canvas id="display" width="64" height="32"></canvas>

        <div class="controls">
            <button id="btn-run">INIT_SYSTEM</button>
            <button id="btn-reset">REBOOT</button>
        </div>

        <div class="instructions">
            USE ARROW KEYS TO MOVE THE SPRITE
        </div>

        <div class="status-msg" id="msg">WAITING FOR OPERATOR...</div>

        <div class="nav">
            <a href="index.html">&#9664; BACK TO DEMO</a>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const canvas = document.getElementById('display');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        const btnRun = document.getElementById('btn-run');
        const btnReset = document.getElementById('btn-reset');

        let running = false;
        let wasmLoaded = false;

        // --- Audio (Synthesis) ---
        let audioCtx = null;
        function nux_play_sound(soundID) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (soundID === 1) { // Eat apple
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, audioCtx.currentTime); // E5
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (soundID === 2) { // Spawn
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (soundID === 3) { // Game over
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("nux.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            wasmLoaded = true;
            msg.innerText = "SYSTEM READY.";
        }).catch(err => {
            console.error(err);
            msg.innerText = "SYSTEM FAILURE: WASM LOAD ERROR";
        });

        function readScore() {
            const mem = nux_get_memory();
            // Score is big-endian int32 at reserved memory addr 8
            return ((mem[8] << 24) | (mem[9] << 16) | (mem[10] << 8) | mem[11]) >>> 0;
        }

        function updateDisplay() {
            const mem = nux_get_memory();
            const fbOffset = 4096;
            const frameWidth = 64, frameHeight = 32;
            const imageData = ctx.createImageData(frameWidth, frameHeight);
            for (let i = 0; i < frameWidth * frameHeight; i++) {
                const p = fbOffset + i * 4;
                // stored as 0x00RRGGBB big-endian: bytes [0x00, R, G, B]
                const r = mem[p + 1];
                const g = mem[p + 2];
                const b = mem[p + 3];
                const idx = i * 4;
                imageData.data[idx]     = r;
                imageData.data[idx + 1] = g;
                imageData.data[idx + 2] = b;
                imageData.data[idx + 3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        let frameCounter = 0;
        const FRAMES_PER_TICK = 6; // 60fps / 6 = ~10 game ticks/sec
        function step() {
            if (!running) return;
            try {
                frameCounter = (frameCounter + 1) % FRAMES_PER_TICK;
                if (frameCounter === 0) {
                    const stillRunning = nux_step_frame();
                    if (!stillRunning) {
                        running = false;
                        updateDisplay();
                        msg.innerText = `GAME OVER — SCORE: ${readScore()}`;
                        btnRun.innerText = "INIT_SYSTEM";
                        return;
                    }
                    updateDisplay();
                    msg.innerText = `SCORE: ${readScore()}`;
                }
            } catch(e) {
                console.error('step error:', e);
            }
            requestAnimationFrame(step);
        }

        btnRun.addEventListener('click', () => {
            if (!wasmLoaded || running) return;
            nux_game_reset();
            running = true;
            frameCounter = 0;
            msg.innerText = "SCORE: 0";
            btnRun.innerText = "RUNNING...";
            step();
        });

        btnReset.addEventListener('click', () => {
            if (!wasmLoaded) return;
            running = false;
            nux_game_reset();
            btnRun.innerText = "INIT_SYSTEM";
            msg.innerText = "SYSTEM REBOOTED.";
            updateDisplay();
        });

        const keyDirMap = { ArrowUp: 1, ArrowDown: 2, ArrowLeft: 3, ArrowRight: 4 };
        window.addEventListener('keydown', (e) => {
            if (!wasmLoaded) return;
            if (e.key.startsWith('Arrow')) e.preventDefault();
            nux_set_keydown(keyDirMap[e.key] ?? 5);
        });
        window.addEventListener('keyup', (e) => {
            if (!wasmLoaded) return;
            nux_set_keydown(0);
        });
    </script>
</body>
</html>
